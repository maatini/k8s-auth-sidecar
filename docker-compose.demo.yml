# Docker Compose demo stack for k8s-auth-sidecar

services:
  # 1. Dummy Backend Application (Was geschützt werden soll)
  backend-app:
    image: traefik/whoami
    container_name: demo-backend-app
    # Wir exposen absichtlich keinen lokalen Port, 
    # da der Zugriff NUR über den Sidecar (Port 8080) erfolgen soll!
    networks:
      - demo-network

  # 2. WireMock OIDC (Mock-Identity-Provider für Tokens)
  wiremock-oidc:
    image: wiremock/wiremock:3.13.2
    container_name: demo-wiremock-oidc
    ports:
      - "8090:8080"
    volumes:
      - ./wiremock/oidc:/home/wiremock
    command:
      - "--global-response-templating"
      - "--verbose"
    networks:
      - demo-network

  # 3. WireMock Roles (Mock-Microservice für Rollen/Attribute)
  wiremock-roles:
    image: wiremock/wiremock:3.13.2
    container_name: demo-wiremock-roles
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock/roles:/home/wiremock
    command:
      - "--global-response-templating"
    networks:
      - demo-network

  # 4. K8s-Auth-Sidecar (Der Türsteher)
  auth-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-auth-sidecar
    ports:
      - "8080:8080" # Das ist der einzige Port, den Clients aufrufen sollen
    volumes:
      # Optional: Lokale Policies mounten (Hot-Reload funktioniert auch hier!)
      - ./opa-wasm/src/main/resources/policies:/policies
    environment:
      # OIDC Settings
      OIDC_AUTH_SERVER_URL: "http://wiremock-oidc:8080/realms/master"
      OIDC_CLIENT_ID: "k8s-auth-sidecar"
      QUARKUS_OIDC_TOKEN_ISSUER: "any"
      QUARKUS_OIDC_JWKS_RESOLVE_EARLY: "false"
      # WireMock returns a static token with iss: http://localhost:8090/realms/master
      # By setting issuer: any and not validating early, Quarkus will skip validating the issuer claim
      # The mock JWT signature is invalid. For the demo, disable Auth temporarily or fix token signing.
      AUTH_ENABLED: "false"
      ROLES_SERVICE_URL: "http://wiremock-roles:8080"

      # Logging
      QUARKUS_LOG_LEVEL: "DEBUG"
    depends_on:
      - backend-app
      - wiremock-oidc
      - wiremock-roles
    networks:
      - demo-network

networks:
  demo-network:
    driver: bridge
