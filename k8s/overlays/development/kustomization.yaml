apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-auth-sidecar

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development
  app: my-application

configMapGenerator:
  - name: k8s-auth-sidecar-config
    behavior: merge
    literals:
      - QUARKUS_LOG_LEVEL=DEBUG
      - SIDECAR_LOG_LEVEL=DEBUG
      - QUARKUS_LOG_JSON=false
      - OTEL_ENABLED=false
      - OIDC_TLS_VERIFICATION=none

images:
  - name: de.edeka.eit/k8s-auth-sidecar
    newTag: "latest"
