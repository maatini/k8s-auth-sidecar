# Example Deployment with K8s-Auth-Sidecar as Sidecar Container
# This deployment shows how to add the sidecar to your application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-application
  labels:
    app: my-application
    app.kubernetes.io/name: my-application
    app.kubernetes.io/part-of: k8s-auth-sidecar-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-application
  template:
    metadata:
      labels:
        app: my-application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      serviceAccountName: my-application
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
        # ==========================================
        # SIDECAR CONTAINER (k8s-auth-sidecar)
        # Handles AuthN/AuthZ before forwarding to main app
        # ==========================================
        - name: k8s-auth-sidecar
          image: de.edeka.eit/k8s-auth-sidecar:0.3.1
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: k8s-auth-sidecar-config
            - secretRef:
                name: k8s-auth-sidecar-secrets
          

          resources:
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
            - name: tmp
              mountPath: /tmp

        # ==========================================
        # MAIN APPLICATION CONTAINER
        # Your actual application that receives authorized requests
        # ==========================================
        - name: application
          image: my-application:latest
          imagePullPolicy: IfNotPresent
          
          # Note: Only exposed internally, not to the service
          ports:
            - name: http-internal
              containerPort: 8085
              protocol: TCP
          
          env:
            - name: SERVER_PORT
              value: "8085"
            # The app doesn't need auth - sidecar handles it
            - name: SECURITY_ENABLED
              value: "false"
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: policies
          configMap:
            name: k8s-auth-sidecar-policies
        - name: tmp
          emptyDir: {}
      
      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: my-application
                topologyKey: kubernetes.io/hostname


