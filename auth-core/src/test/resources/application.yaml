# Test configuration
quarkus:
  log:
    level: WARN
    console:
      json: false
  
  oidc:
    # Use Quarkus test OIDC server
    auth-server-url: ${keycloak.url:http://localhost:8180}/realms/quarkus
    client-id: test-client
    credentials:
      secret: test-secret
    tls:
      verification: none

  # Disable tracing for tests
  otel:
    enabled: false

sidecar:
  auth:
    enabled: true
    public-paths:
      - /health
      - /q/health
      - /q/metrics
      - /api/public/**
  
  authz:
    enabled: true
  
  opa:
    enabled: true
    embedded:
      wasm-path: classpath:policies/authz.wasm
  
  proxy:
    target:
      host: localhost
      port: 8081
    # Simplified headers without placeholders for tests
    add-headers: {}
  
  audit:
    enabled: false
